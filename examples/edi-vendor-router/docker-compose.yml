# Local SFTP server for running this example.
# Creates user wso2/wso2123 with the inbox and per-vendor destination folders.
# Start with: docker compose up -d
services:
  sftp:
    image: atmoz/sftp:latest
    container_name: edi-sftp
    ports:
      - "22:22"
    command: >
      wso2:wso2123:::edi/inbox,edi/vendors/acme,edi/vendors/globex,edi/vendors/unknown
